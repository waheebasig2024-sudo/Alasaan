kind = "mobile"
previewPath = "/mobile/"
title = "الحسن - مساعد ذكي"
version = "1.0.0"
id = "artifacts/al-hassan"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 19000

[services.development]
run = "pnpm --filter @workspace/al-hassan run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/al-hassan", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/al-hassan", "run", "serve" ]

[services.env]
PORT = "19000"
BASE_PATH = "/mobile/"
