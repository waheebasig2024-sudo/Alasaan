openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: gemini
    description: Gemini assistant operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /gemini/chat:
    post:
      operationId: sendGeminiChat
      tags: [gemini]
      summary: Send a message to Gemini
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GeminiChatRequest"
      responses:
        "200":
          description: Gemini response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeminiChatResponse"
        "400":
          description: Invalid request
        "500":
          description: Gemini failed
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    GeminiChatRequest:
      type: object
      properties:
        message:
          type: string
        history:
          type: array
          items:
            type: object
            additionalProperties: true
        systemPrompt:
          type: string
        model:
          type: string
          default: gemini-2.5-flash
      required:
        - message
    GeminiChatResponse:
      type: object
      properties:
        text:
          type: string
        success:
          type: boolean
        error:
          type: string
      required:
        - success

